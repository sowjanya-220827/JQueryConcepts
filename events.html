<!DOCTYPE html>
<html>
<head>

<title>jQuery Events</title>

<link rel="stylesheet" href="styles.css">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="script.js"></script>

</head>

<body>

<h1>jQuery Event Handling</h1>

<h2>Mouse Events</h2>

<button id="clickBtn">Click</button>
<button id="dblclickBtn">Double Click</button>

<p id="mouseArea">Move mouse here</p>

<button id="downBtn">Mouse Down</button>
<button id="upBtn">Mouse Up</button>

<p id="mouseResult"></p>

<h2>Keyboard Events</h2>

<input type="text" id="keyboardInput" placeholder="Type something">

<p id="keyResult"></p>

<h2>Form Events</h2>

<form id="myForm">

<input type="text" id="name" placeholder="Enter name">
<br><br>

<select id="course">
<option value="">Select Course</option>
<option>Java</option>
<option>Python</option>
<option>Web Development</option>
</select>

<br><br>

<button type="submit">Submit</button>

</form>

<p id="formResult"></p>
<h2>General Event Methods</h2>

<button id="onBtn">Activate Event</button>
<button id="offBtn">Remove Event</button>

<p id="onText">Click event will work here</p>

</body>
</html>
