<!DOCTYPE html>
<html>
<head>

<title>jQuery Attribute Methods</title>

<link rel="stylesheet" href="styles.css">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="script.js"></script>

</head>

<body>

<h1>jQuery Attribute Methods</h1>

<h2>1. Change Image Source (attr)</h2>

<img id="myImage" src="bird.png" width="150">

<br><br>

<button id="changeImg">Change Image</button>


<h2>2. Enable / Disable Checkbox (prop)</h2>

<input type="checkbox" id="agree"> I Agree

<br><br>

<button id="disableCheck">Disable Checkbox</button>
<button id="enableCheck">Enable Checkbox</button>


<h2>3. Retrieve Input Value (val)</h2>

<input type="text" id="username" placeholder="Enter your name">

<button id="showValue">Show Value</button>

<p id="result"></p>


<h2>4. Remove Attribute (removeAttr)</h2>

<button id="remove">Remove Checkbox Disabled Attribute</button>

</body>
</html>
